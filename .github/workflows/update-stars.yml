name: Weekly Star Count Update

on:
  schedule:
    # Every Monday at 09:17 UTC (17:17 Beijing time)
    - cron: '17 9 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  update-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run star count updater
        id: update
        run: python scripts/update_stars.py --apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly star count update (${{ github.run_id }})"
          title: "⭐ Weekly Star Count Update"
          body: |
            Automated weekly update of GitHub star counts.

            - Re-sorted projects by current star count (descending)
            - Updated "last verified" date
            - Check the diff for any projects that dropped below 500 stars

            🤖 Generated by GitHub Actions
          branch: auto/update-stars
          delete-branch: true
